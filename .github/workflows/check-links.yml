name: "Check Links and Auto-fix 404"

on:
  workflow_run:
    workflows: ["Deploy Jekyll to GitHub Pages"]
    types:
      - completed
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site locally
        run: |
          bundle exec jekyll build --source docs --destination _site --config _config.yml

      - name: Check all internal links
        id: check-links
        shell: bash
        run: |
          echo "Checking all internal links..."
          rm -f /tmp/broken-links.txt

          find _site -name "*.html" -type f | while read -r html_file; do
            grep -oE 'href="[^"]*"' "$html_file" 2>/dev/null | sed 's/href="//;s/"$//' | while read -r link; do
              # 跳過外部連結、錨點、mailto、javascript
              if [[ "$link" =~ ^https?:// ]] || [[ "$link" =~ ^# ]] || [[ "$link" =~ ^mailto: ]] || [[ "$link" =~ ^javascript: ]] || [[ -z "$link" ]]; then
                continue
              fi

              # 處理相對路徑
              if [[ "$link" =~ ^/ ]]; then
                target="_site${link}"
              else
                dir=$(dirname "$html_file")
                target="$dir/$link"
              fi

              # 用 Python 正規化路徑（正確處理多層 ..）
              target=$(python3 -c "import os.path; print(os.path.normpath('$target'))")

              # 移除錨點
              target=$(echo "$target" | sed 's/#.*//')

              # 移除尾部斜線
              target=$(echo "$target" | sed 's|/$||')

              # 檢查目標是否存在（含 .html 後綴、目錄、index.html）
              if [[ ! -f "$target" ]] && [[ ! -f "${target}.html" ]] && [[ ! -f "${target}/index.html" ]] && [[ ! -d "$target" ]]; then
                echo "BROKEN|$html_file|$link|$target" >> /tmp/broken-links.txt
              fi
            done
          done

          if [[ -f /tmp/broken-links.txt ]]; then
            echo "Found broken links:"
            cat /tmp/broken-links.txt
            echo "has_broken_links=true" >> "$GITHUB_OUTPUT"

            count=$(wc -l < /tmp/broken-links.txt | tr -d ' ')
            echo "broken_count=$count" >> "$GITHUB_OUTPUT"
          else
            echo "All links are valid!"
            echo "has_broken_links=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Attempt auto-fix in source files
        if: steps.check-links.outputs.has_broken_links == 'true'
        shell: bash
        run: |
          echo "Attempting to fix broken links in source files..."

          while IFS='|' read -r status html_file link target; do
            echo "Processing: $link in $html_file"

            # 從 HTML 路徑反推 MD 路徑
            md_path=$(echo "$html_file" | sed 's|^_site/|docs/|' | sed 's|/index\.html$|.md|' | sed 's|\.html$|.md|')

            if [[ ! -f "$md_path" ]]; then
              md_path=$(echo "$html_file" | sed 's|^_site/|docs/|' | sed 's|\.html$|/index.md|')
            fi

            if [[ ! -f "$md_path" ]]; then
              echo "  Cannot find source MD for $html_file, skipping"
              continue
            fi

            echo "  Source file: $md_path"

            # 提取連結的基本名稱
            base_name=$(basename "$link" | sed 's/\.html$//' | sed 's/\.md$//')

            # 搜尋可能的正確目標（排除 index.md 避免誤配）
            if [[ "$base_name" == "index" ]]; then
              echo "  Skipping auto-fix for 'index' links (too ambiguous)"
              continue
            fi

            # 只在同一 Mode/Layer 目錄下搜尋，避免跨目錄誤配
            search_dir=$(dirname "$md_path")
            found=$(find "$search_dir" -maxdepth 3 -type f -name "${base_name}.md" | head -1)

            # 若同目錄找不到，再往 docs/ 全域找（但限定唯一匹配）
            if [[ -z "$found" ]]; then
              match_count=$(find docs -type f -name "${base_name}.md" | wc -l | tr -d ' ')
              if [[ "$match_count" -eq 1 ]]; then
                found=$(find docs -type f -name "${base_name}.md")
              else
                echo "  Found $match_count matches for ${base_name}.md, skipping (ambiguous)"
                continue
              fi
            fi

            if [[ -n "$found" ]] && [[ -f "$found" ]]; then
              echo "  Found correct target: $found"

              # 用 Python 計算相對路徑（避免 shell injection）
              source_dir=$(dirname "$md_path")
              new_link=$(python3 -c "
          import os.path, sys
          rel = os.path.relpath(sys.argv[1], sys.argv[2]).replace('.md', '')
          print(rel)
          " "$found" "$source_dir")

              echo "  New link: $new_link"

              # 使用 Python 做安全替換（避免 sed 特殊字元問題）
              python3 -c "
          import sys
          md_path, old_link, new_link = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(md_path, 'r') as f:
              content = f.read()
          updated = content.replace('](' + old_link + ')', '](' + new_link + ')')
          if updated != content:
              with open(md_path, 'w') as f:
                  f.write(updated)
              print(f'  Fixed: {old_link} -> {new_link}')
          else:
              print(f'  Link pattern not found in source MD')
          " "$md_path" "$link" "$new_link"
            else
              echo "  No match found for $base_name"
            fi
          done < /tmp/broken-links.txt

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes made:"
            git diff --stat
          fi

      - name: Commit fixes directly
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "fix: auto-fix broken links detected by check-links workflow"
          git pull --rebase origin main
          git push

      - name: Report status
        if: always()
        run: |
          if [[ "${{ steps.check-links.outputs.has_broken_links }}" == "true" ]]; then
            echo "::warning::Found ${{ steps.check-links.outputs.broken_count }} broken links"
            if [[ "${{ steps.check-changes.outputs.has_changes }}" == "true" ]]; then
              echo "::notice::Fixes have been committed automatically"
            else
              echo "::error::Could not auto-fix all broken links. Manual intervention required."
              cat /tmp/broken-links.txt || true
            fi
          else
            echo "::notice::All links are valid!"
          fi

      - name: Fail if unfixed broken links
        if: steps.check-links.outputs.has_broken_links == 'true' && steps.check-changes.outputs.has_changes == 'false'
        run: |
          echo "Broken links could not be auto-fixed:"
          cat /tmp/broken-links.txt
          exit 1
