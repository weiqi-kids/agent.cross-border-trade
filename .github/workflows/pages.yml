name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: |
          bundle exec jekyll build --baseurl "" --source docs --destination ./_site --config _config.yml
        env:
          JEKYLL_ENV: production

      - name: Validate rendered JSON-LD (pre-deploy gate)
        shell: bash
        run: |
          # 檢查「渲染後」的 _site HTML 是否含有效且完整的結構化資料。
          # 這是 source-based 檢查抓不到的：head_custom 只對 layout: default 渲染、
          # jekyll-seo-tag 不渲染自訂 json_ld，唯有驗證 _site 才能確認 schema 真的上線。
          fail=0
          echo "== Homepage =="
          python3 scripts/check-jsonld.py _site/index.html WebSite WebPage Organization || fail=1
          echo "== Narrator pages =="
          while IFS= read -r html; do
            python3 scripts/check-jsonld.py "$html" WebPage Article Person Organization BreadcrumbList || fail=1
          done < <(find _site/Narrator -name '*.html' -type f 2>/dev/null)
          if [[ $fail -ne 0 ]]; then
            echo "::error::Rendered JSON-LD 驗證失敗：結構化資料無效或缺少必填 @type，已阻擋部署。"
            exit 1
          fi
          echo "✅ 所有已發布頁面的 JSON-LD 結構化資料皆有效且完整。"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
